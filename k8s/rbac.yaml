apiVersion: v1
kind: ServiceAccount
metadata:
  name: langfuse-webhook
  namespace: langfuse
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: langfuse-webhook-pod-exec
  namespace: langfuse
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/exec"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: langfuse-webhook-pod-exec
  namespace: langfuse
subjects:
  - kind: ServiceAccount
    name: langfuse-webhook
    namespace: langfuse
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: langfuse-webhook-pod-exec
