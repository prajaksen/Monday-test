apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: llm-monitoring
data:
  collector-config.yaml: |-
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 1024
        spike_limit_mib: 200

      k8s_attributes:
        auth_type: serviceAccount
        passthrough: false

      resource:
        attributes:
          - key: cloud.provider
            action: upsert
            value: aws

          - key: cloud.platform
            action: upsert
            value: eks

          - key: deployment.environment
            action: upsert
            value: production

      batch:
        timeout: 10s
        send_batch_size: 512
        send_batch_max_size: 512

    exporters:
      otlp_grpc:
        endpoint: ${env:LANGFUSE_OTLP_ENDPOINT}
        tls:
          insecure: true

      prometheus:
        endpoint: 0.0.0.0:8889

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

      pprof:
        endpoint: 0.0.0.0:1777

      zpages:
        endpoint: 0.0.0.0:55679

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8s_attributes, resource, batch]
          exporters: [otlp_grpc]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource]
          exporters: [prometheus]

