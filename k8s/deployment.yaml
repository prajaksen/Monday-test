apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-webhook
  namespace: langfuse
  labels:
    app: langfuse-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-webhook
  template:
    metadata:
      labels:
        app: langfuse-webhook
    spec:
      containers:
        - name: webhook
          image: langfuse-webhook:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: production
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-webhook-secrets
                  key: webhook-secret
            - name: NAMESPACE
              value: langfuse
            - name: POSTGRES_POD
              value: langfuse-postgresql-0
            - name: POSTGRES_DB
              value: postgres_langfuse
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-webhook-secrets
                  key: postgres-password
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-webhook
  namespace: langfuse
spec:
  selector:
    app: langfuse-webhook
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
