apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-chatbot
  namespace: langfuse
  labels:
    app: langfuse-chatbot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse-chatbot
  template:
    metadata:
      labels:
        app: langfuse-chatbot
    spec:
      containers:
        - name: chatbot
          image: langfuse-chatbot:local
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_ENV
              value: production
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-webhook-secrets
                  key: webhook-secret
                  optional: true
            - name: LANGFUSE_HOST
              value: http://langfuse:3000
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-webhook-secrets
                  key: langfuse-public-key
                  optional: true
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-webhook-secrets
                  key: langfuse-secret-key
                  optional: true
            - name: OLLAMA_BASE_URL
              value: http://ollama:11434
            - name: OLLAMA_MODEL
              value: llama3.2
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-chatbot
  namespace: langfuse
spec:
  selector:
    app: langfuse-chatbot
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
