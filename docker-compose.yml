version: "3.9"
services:
  chatbot:
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  ollama-data:
