image:
  repository: otel/opentelemetry-collector-contrib
mode: deployment
replicaCount: 1
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
serviceAccount:
  annotations:
    eks.amazonaws.com/role-arn: <REDACTED-ARN>
